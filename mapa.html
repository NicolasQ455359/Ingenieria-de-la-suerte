        // --- PROCEDURAL 2D BACKGROUND MAP GENERATION ---
        function drawMedellinMap() {
            const W = 2048, H = 1536;
            const c = document.createElement('canvas');
            c.width = W; c.height = H;
            const ctx = c.getContext('2d');
            const X = (nx) => nx * W;
            const Y = (ny) => ny * H;

            ctx.fillStyle = '#080808';
            ctx.fillRect(0, 0, W, H);

            const vig = ctx.createRadialGradient(W*0.50, H*0.48, W*0.18, W*0.50, H*0.48, W*0.58);
            vig.addColorStop(0, 'rgba(15,15,12,0)');
            vig.addColorStop(0.6, 'rgba(8,8,6,0)');
            vig.addColorStop(1, 'rgba(3,3,2,0.7)');
            ctx.fillStyle = vig;
            ctx.fillRect(0, 0, W, H);

            ctx.lineWidth = 0.8;
            for (let nx = 0.28; nx <= 0.72; nx += 0.012) {
                const d = Math.abs(nx - 0.50);
                if (d > 0.15 && Math.random() > 0.6) continue;
                const sy = 0.12 + d * 0.5 + Math.random() * 0.05;
                const ey = 0.88 - d * 0.5 - Math.random() * 0.05;
                ctx.strokeStyle = `rgba(212,175,55,${0.04 + Math.random()*0.03})`;
                ctx.beginPath(); ctx.moveTo(X(nx), Y(sy)); ctx.lineTo(X(nx), Y(ey)); ctx.stroke();
            }
            for (let ny = 0.15; ny <= 0.88; ny += 0.015) {
                const d = Math.abs(ny - 0.50);
                if (d > 0.25 && Math.random() > 0.5) continue;
                const sx = 0.25 + d * 0.3 + Math.random() * 0.04;
                const ex = 0.72 - d * 0.2 - Math.random() * 0.04;
                ctx.strokeStyle = `rgba(212,175,55,${0.04 + Math.random()*0.03})`;
                ctx.beginPath(); ctx.moveTo(X(sx), Y(ny)); ctx.lineTo(X(ex), Y(ny)); ctx.stroke();
            }

            ctx.fillStyle = 'rgba(212,175,55,0.012)';
            for (let bx = 0.30; bx < 0.70; bx += 0.025) {
                for (let by = 0.18; by < 0.82; by += 0.030) {
                    const d = Math.sqrt(Math.pow(bx-0.50,2) + Math.pow(by-0.48,2));
                    if (d > 0.22 && Math.random() > 0.4) continue;
                    const bw = 0.010 + Math.random()*0.008;
                    const bh = 0.012 + Math.random()*0.010;
                    ctx.fillRect(X(bx), Y(by), X(bw), Y(bh));
                }
            }

            nsAv.forEach(av => {
                ctx.strokeStyle = av.w >= 4 ? 'rgba(212,175,55,0.28)' : 'rgba(212,175,55,0.15)';
                ctx.lineWidth = av.w;
                ctx.beginPath(); ctx.moveTo(X(av.x), Y(av.from)); ctx.lineTo(X(av.x), Y(av.to)); ctx.stroke();
                if (av.label) {
                    ctx.save(); ctx.translate(X(av.x) - 8, Y(av.from + 0.06));
                    ctx.rotate(-Math.PI / 2);
                    ctx.font = '11px "Outfit", Arial, sans-serif';
                    ctx.fillStyle = 'rgba(212,175,55,0.22)';
                    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
                    ctx.fillText(av.label, 0, 0);
                    ctx.restore();
                }
            });

            ewSt.forEach(st => {
                ctx.strokeStyle = st.w >= 4 ? 'rgba(212,175,55,0.25)' : 'rgba(212,175,55,0.14)';
                ctx.lineWidth = st.w;
                ctx.beginPath(); ctx.moveTo(X(st.from), Y(st.y)); ctx.lineTo(X(st.to), Y(st.y)); ctx.stroke();
                if (st.label) {
                    ctx.font = '10px "Outfit", Arial, sans-serif';
                    ctx.fillStyle = 'rgba(212,175,55,0.20)';
                    ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
                    ctx.fillText(st.label, X(st.from + 0.01), Y(st.y) - 5);
                }
            });

            const riverPts = [];
            for (let t = 0; t <= 1; t += 0.005) {
                const rx = 0.510 + Math.sin(t * 7.5) * 0.007 + Math.sin(t * 3.2) * 0.012;
                riverPts.push({ x: X(rx), y: Y(t) });
            }
            ctx.strokeStyle = 'rgba(10,80,55,0.12)';
            ctx.lineWidth = 38; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.beginPath(); riverPts.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y)); ctx.stroke();
            
            ctx.strokeStyle = 'rgba(12,100,68,0.45)';
            ctx.lineWidth = 18;
            ctx.beginPath(); riverPts.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y)); ctx.stroke();

            const metroStations = [0.22, 0.30, 0.38, 0.43, 0.50, 0.60, 0.67, 0.77];
            metroStations.forEach(sy => {
                ctx.fillStyle = 'rgba(255,255,255,0.35)';
                ctx.beginPath(); ctx.arc(X(0.498), Y(sy), 4, 0, Math.PI*2); ctx.fill();
            });

            const hoods = [
                { text: 'ROBLEDO', x: 0.365, y: 0.185, s: 16 },
                { text: 'LAURELES', x: 0.415, y: 0.440, s: 17 },
                { text: 'EL CENTRO', x: 0.510, y: 0.445, s: 15 },
                { text: 'EL POBLADO', x: 0.565, y: 0.690, s: 17 },
                { text: 'ENVIGADO', x: 0.530, y: 0.855, s: 15 }
            ];
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            hoods.forEach(h => {
                ctx.font = `300 ${h.s}px "Outfit", Arial, sans-serif`;
                ctx.fillStyle = 'rgba(212,175,55,0.14)';
                ctx.fillText(h.text, X(h.x), Y(h.y));
            });

            return c;
        }

        // --- HEIGHT & WORLD TRANSLATE ---
        function getHeight(x, z) {
            const nx = x / planeW, nz = z / planeH;
            const valley = Math.pow(Math.abs(nx) * 2.3, 2) * 14;
            const slope = -nz * 4;
            const n1 = Math.sin(nx*48+2.3)*Math.cos(nz*40+1.1)*2.0;
            const n2 = Math.sin(nx*24+nz*30+0.5)*1.4;
            return valley + slope + n1 + n2;
        }

        function toWorld(px, py) {
            const x = (px - 0.5) * planeW;
            const z = (py - 0.5) * planeH;
            return new THREE.Vector3(x, getHeight(x, z) + 0.5, z);
        }

        // --- MAP CONSTRUCTORS ---
        function createTerrain(texture) {
            const aspect = texture.image.width / texture.image.height;
            planeH = planeW / aspect;
            const segs = 200;
            const geo = new THREE.PlaneGeometry(planeW, planeH, segs, segs);
            geo.rotateX(-Math.PI / 2);
            const pos = geo.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                pos.setY(i, getHeight(pos.getX(i), pos.getZ(i)));
            }
            geo.computeVertexNormals();
            scene.add(new THREE.Mesh(geo, new THREE.MeshStandardMaterial({
                map: texture, roughness: 0.82, metalness: 0.06
            })));

            // Ring
            const rG = new THREE.RingGeometry(Math.max(planeW,planeH)*0.52, Math.max(planeW,planeH)*0.55, 64);
            rG.rotateX(-Math.PI/2);
            const ring = new THREE.Mesh(rG, new THREE.MeshBasicMaterial({
                color: 0xD4AF37, transparent: true, opacity: 0.08, side: THREE.DoubleSide
            }));
            ring.position.y = -3; scene.add(ring);
        }

        // Floating dynamic casino neon icon canvas
        function createIconTexture(type) {
            const s = 128, c = document.createElement('canvas');
            c.width = s; c.height = s;
            const ctx = c.getContext('2d');
            const cx = s/2, cy = s/2, r = s*0.36;
            const g = ctx.createRadialGradient(cx,cy,r*0.5,cx,cy,r*1.6);
            g.addColorStop(0,'rgba(212,175,55,0.28)'); g.addColorStop(1,'rgba(212,175,55,0)');
            ctx.fillStyle = g; ctx.fillRect(0,0,s,s);
            ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
            ctx.fillStyle = 'rgba(17,17,17,0.94)'; ctx.fill();
            ctx.strokeStyle = '#D4AF37'; ctx.lineWidth = 2.5; ctx.stroke();
            
            ctx.fillStyle = '#D4AF37'; ctx.strokeStyle = '#D4AF37';
            ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            drawIcon(ctx, type, cx, cy, r);
            const tex = new THREE.CanvasTexture(c); tex.needsUpdate = true;
            return tex;
        }

        function drawIcon(ctx, type, cx, cy, r) {
            switch (type) {
                case 'slot': {
                    const w = r*1.3, h = r*1.0, x0 = cx-w/2, y0 = cy-h/2, cw = w/3;
                    ctx.strokeRect(x0,y0,w,h);
                    ctx.beginPath(); ctx.moveTo(x0+cw,y0); ctx.lineTo(x0+cw,y0+h);
                    ctx.moveTo(x0+cw*2,y0); ctx.lineTo(x0+cw*2,y0+h); ctx.stroke();
                    ctx.font = `bold ${r*0.48}px Outfit`;
                    ctx.textAlign='center'; ctx.textBaseline='middle';
                    ctx.fillText('7',x0+cw*0.5,cy); ctx.fillText('$',x0+cw*1.5,cy); ctx.fillText('♦',x0+cw*2.5,cy);
                    break;
                }
                case 'chart_up': {
                    ctx.beginPath(); ctx.moveTo(cx-r*0.55,cy+r*0.5); ctx.lineTo(cx-r*0.55,cy-r*0.45);
                    ctx.moveTo(cx-r*0.55,cy+r*0.5); ctx.lineTo(cx+r*0.55,cy+r*0.5); ctx.stroke();
                    ctx.lineWidth=3; ctx.strokeStyle='#2ecc71';
                    ctx.beginPath(); ctx.moveTo(cx-r*0.4,cy+r*0.3); ctx.lineTo(cx-r*0.1,cy+r*0.05);
                    ctx.lineTo(cx+r*0.12,cy+r*0.18); ctx.lineTo(cx+r*0.42,cy-r*0.38); ctx.stroke();
                    ctx.strokeStyle='#D4AF37'; ctx.lineWidth=2.5; break;
                }
                case 'explosion': {
                    const spikes=8; ctx.beginPath();
                    for (let i=0;i<spikes*2;i++){
                        const a=(i/(spikes*2))*Math.PI*2-Math.PI/2;
                        const d=i%2===0?r*0.75:r*0.3;
                        const px=cx+Math.cos(a)*d, py=cy+Math.sin(a)*d;
                        i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
                    }
                    ctx.closePath(); ctx.fillStyle='#B71C1C'; ctx.fill(); ctx.stroke();
                    ctx.fillStyle='#D4AF37'; ctx.font=`bold ${r*0.7}px Outfit`;
                    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('✕',cx,cy+1); break;
                }
                case 'star': {
                    ctx.beginPath();
                    for(let i=0;i<5;i++){
                        const oa=(i*2*Math.PI/5)-Math.PI/2, ia=oa+Math.PI/5;
                        ctx.lineTo(cx+Math.cos(oa)*r*0.72,cy+Math.sin(oa)*r*0.72);
                        ctx.lineTo(cx+Math.cos(ia)*r*0.3,cy+Math.sin(ia)*r*0.3);
                    }
                    ctx.closePath(); ctx.fill(); ctx.stroke(); break;
                }
                case 'chart_down': {
                    ctx.beginPath(); ctx.moveTo(cx-r*0.55,cy-r*0.5); ctx.lineTo(cx-r*0.55,cy+r*0.5);
                    ctx.moveTo(cx-r*0.55,cy+r*0.5); ctx.lineTo(cx+r*0.55,cy+r*0.5); ctx.stroke();
                    ctx.lineWidth=3; ctx.strokeStyle='#e74c3c';
                    ctx.beginPath(); ctx.moveTo(cx-r*0.4,cy-r*0.35); ctx.lineTo(cx-r*0.1,cy-r*0.08);
                    ctx.lineTo(cx+r*0.12,cy+r*0.02); ctx.lineTo(cx+r*0.42,cy+r*0.35); ctx.stroke();
                    ctx.strokeStyle='#D4AF37'; ctx.lineWidth=2.5; break;
                }
                case 'skull': {
                    ctx.beginPath(); ctx.arc(cx,cy-r*0.08,r*0.52,Math.PI,0);
                    ctx.lineTo(cx+r*0.35,cy+r*0.3); ctx.lineTo(cx-r*0.35,cy+r*0.3); ctx.closePath(); ctx.fill();
                    ctx.fillRect(cx-r*0.32,cy+r*0.28,r*0.64,r*0.22);
                    ctx.fillStyle='#111'; ctx.beginPath();
                    ctx.arc(cx-r*0.18,cy-r*0.08,r*0.12,0,Math.PI*2);
                    ctx.arc(cx+r*0.18,cy-r*0.08,r*0.12,0,Math.PI*2); ctx.fill();
                    break;
                }
            }
        }

        // --- CHARACTER MODEL ---
        function createCharacterTexture() {
            const s = 128, c = document.createElement('canvas');
            c.width = s; c.height = s;
            const ctx = c.getContext('2d');
            const glow = ctx.createRadialGradient(s/2, s*0.72, 3, s/2, s*0.72, s*0.42);
            glow.addColorStop(0, 'rgba(212,175,55,0.6)');
            glow.addColorStop(1, 'rgba(212,175,55,0)');
            ctx.fillStyle = glow; ctx.fillRect(0, 0, s, s);
            // P1 - Samuel
            drawPerson(ctx, s*0.36, s*0.22, '#D4AF37', s*0.09);
            // P2 - Jerónimo
            drawPerson(ctx, s*0.64, s*0.24, '#ebd07a', s*0.09);
            return new THREE.CanvasTexture(c);
        }

        function drawPerson(ctx, cx, topY, color, r) {
            ctx.fillStyle = color;
            ctx.beginPath(); ctx.arc(cx, topY, r, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.moveTo(cx - r*0.9, topY + r*1.5); ctx.lineTo(cx, topY + r*3.8); ctx.lineTo(cx + r*0.9, topY + r*1.5); ctx.closePath(); ctx.fill();
            ctx.strokeStyle = color; ctx.lineWidth = r * 0.4; ctx.lineCap = 'round';
            ctx.beginPath(); ctx.moveTo(cx - r*0.7, topY + r*1.8); ctx.lineTo(cx - r*1.5, topY + r*3.0); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx + r*0.7, topY + r*1.8); ctx.lineTo(cx + r*1.5, topY + r*3.0); ctx.stroke();
        }

        function createCasinoMarkers() {

        // --- PROCEDURAL 3D CITY GENERATOR ---
        function createWindowTexture() {
            const size = 64;
            const canvas = document.createElement('canvas');
            canvas.width = size; canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#000000'; ctx.fillRect(0, 0, size, size);
            
            ctx.fillStyle = '#ffdf6d';
            const rows = 4; const cols = 4;
            const wWidth = 8; const wHeight = 10;
            const xGap = 6; const yGap = 5;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (Math.random() > 0.4) {
                        ctx.fillStyle = Math.random() > 0.5 ? '#ffdf6d' : '#8fa9ff';
                        ctx.fillRect(xGap + c * (wWidth + xGap), yGap + r * (wHeight + yGap), wWidth, wHeight);
                    }
                }
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping; texture.wrapT = THREE.RepeatWrapping;
            return texture;
        }

        function generateProceduralCity() {
            const skyscrapersList = [];
            const housesList = [];
            const winTex = createWindowTexture();

            for (let j = 0; j < nsAv.length - 1; j++) {
                const av1 = nsAv[j];
                const av2 = nsAv[j+1];
                for (let k = 0; k < ewSt.length - 1; k++) {
                    const st1 = ewSt[k];
                    const st2 = ewSt[k+1];

                    const xCenter = (av1.x + av2.x) / 2;
                    const yCenter = (st1.y + st2.y) / 2;

                    const xMin = av1.x + 0.003; const xMax = av2.x - 0.003;
                    const yMin = st1.y + 0.003; const yMax = st2.y - 0.003;
                    if (xMin >= xMax || yMin >= yMax) continue;

                    let isSkyscraperBlock = false;
                    let density = 6;
                    let heightRange = { min: 4, max: 8 };

                    if (Math.abs(xCenter - 0.51) < 0.04 && Math.abs(yCenter - 0.44) < 0.12) {
                        isSkyscraperBlock = true; density = 8; heightRange = { min: 25, max: 48 };
                    }
                    else if (Math.abs(xCenter - 0.565) < 0.05 && Math.abs(yCenter - 0.69) < 0.12) {
                        isSkyscraperBlock = true; density = 7; heightRange = { min: 20, max: 40 };
                    }
                    else {
                        isSkyscraperBlock = false; density = 10; heightRange = { min: 3, max: 7 };
                    }

                    const w = xMax - xMin;
                    const h = yMax - yMin;
                    const cols = Math.floor(Math.sqrt(density));
                    const rows = Math.ceil(density / cols);

                    for (let r = 0; r < rows; r++) {
                        for (let c = 0; c < cols; c++) {
                            const px = xMin + w * ((c + 0.2 + Math.random()*0.6) / cols);
                            const py = yMin + h * ((r + 0.2 + Math.random()*0.6) / rows);

                            const rx = 0.510 + Math.sin(py * 7.5) * 0.007 + Math.sin(py * 3.2) * 0.012;
                            if (Math.abs(px - rx) < 0.024) continue; 

                            const height = heightRange.min + Math.random() * (heightRange.max - heightRange.min);
                            const pos = toWorld(px, py);
                            const scaleX = isSkyscraperBlock ? 8.5 + Math.random()*4.5 : 4.2 + Math.random()*2.2;
                            const scaleZ = isSkyscraperBlock ? 8.5 + Math.random()*4.5 : 4.2 + Math.random()*2.2;

                            const item = { x: pos.x, y: pos.y - 0.5, z: pos.z, sx: scaleX, sy: height, sz: scaleZ };
                            if (isSkyscraperBlock) skyscrapersList.push(item);
                            else housesList.push(item);
                        }
                    }
                }
            }

            if (skyscrapersList.length > 0) {
                const geoBase = new THREE.BoxGeometry(1, 1, 1);
                const matBase = new THREE.MeshStandardMaterial({
                    color: 0x0c111e, roughness: 0.1, metalness: 0.9,
                    emissiveMap: winTex, emissive: new THREE.Color(0x99bbff), emissiveIntensity: 1.6
                });

                skyscrapersMesh = new THREE.InstancedMesh(geoBase, matBase, skyscrapersList.length);
                skyscrapersMidMesh = new THREE.InstancedMesh(geoBase, matBase, skyscrapersList.length);
                skyscrapersTopMesh = new THREE.InstancedMesh(geoBase, matBase, skyscrapersList.length);

                const geoSpire = new THREE.CylinderGeometry(0.02, 0.25, 1, 8);
                skyscrapersSpireMesh = new THREE.InstancedMesh(geoSpire, new THREE.MeshBasicMaterial({ color: 0xD4AF37 }), skyscrapersList.length);

                const dummy = new THREE.Object3D();
                skyscrapersList.forEach((b, i) => {
                    const baseH = b.sy * 0.45;
                    dummy.position.set(b.x, b.y + baseH/2, b.z); dummy.scale.set(b.sx, baseH, b.sz); dummy.updateMatrix();
                    skyscrapersMesh.setMatrixAt(i, dummy.matrix);

                    const midH = b.sy * 0.35;
                    dummy.position.set(b.x, b.y + baseH + midH/2, b.z); dummy.scale.set(b.sx*0.75, midH, b.sz*0.75); dummy.updateMatrix();
                    skyscrapersMidMesh.setMatrixAt(i, dummy.matrix);

                    const topH = b.sy * 0.20;
                    dummy.position.set(b.x, b.y + baseH + midH + topH/2, b.z); dummy.scale.set(b.sx*0.5, topH, b.sz*0.5); dummy.updateMatrix();
                    skyscrapersTopMesh.setMatrixAt(i, dummy.matrix);

                    const spireH = 9.0;
                    dummy.position.set(b.x, b.y + b.sy + spireH/2, b.z); dummy.scale.set(1.0, spireH, 1.0); dummy.updateMatrix();
                    skyscrapersSpireMesh.setMatrixAt(i, dummy.matrix);

                    const color = Math.random() > 0.65 ? new THREE.Color(0x1a120c) : new THREE.Color(0x0a0f18);
                    skyscrapersMesh.setColorAt(i, color); skyscrapersMidMesh.setColorAt(i, color); skyscrapersTopMesh.setColorAt(i, color);
                });

                skyscrapersMesh.instanceMatrix.needsUpdate = true;
                skyscrapersMidMesh.instanceMatrix.needsUpdate = true;
                skyscrapersTopMesh.instanceMatrix.needsUpdate = true;
                skyscrapersSpireMesh.instanceMatrix.needsUpdate = true;

                scene.add(skyscrapersMesh); scene.add(skyscrapersMidMesh); scene.add(skyscrapersTopMesh); scene.add(skyscrapersSpireMesh);
            }

            if (housesList.length > 0) {
                const geoBase = new THREE.BoxGeometry(1, 1, 1);
                const matBase = new THREE.MeshStandardMaterial({
                    color: 0xdeb887, roughness: 0.85, metalness: 0.1,
                    emissiveMap: winTex, emissive: new THREE.Color(0xff8822), emissiveIntensity: 0.5
                });

                const geoRoof = new THREE.ConeGeometry(0.707, 1, 4).rotateY(Math.PI / 4);
                housesMesh = new THREE.InstancedMesh(geoBase, matBase, housesList.length);
                housesRoofMesh = new THREE.InstancedMesh(geoRoof, new THREE.MeshStandardMaterial({ color: 0x8a2c1d, roughness: 0.9 }), housesList.length);

                const dummy = new THREE.Object3D();
                housesList.forEach((h, i) => {
                    const baseH = h.sy * 0.70;
                    dummy.position.set(h.x, h.y + baseH/2, h.z); dummy.scale.set(h.sx, baseH, h.sz); dummy.updateMatrix();
                    housesMesh.setMatrixAt(i, dummy.matrix);

                    const roofH = h.sy * 0.35;
                    dummy.position.set(h.x, h.y + baseH + roofH/2, h.z); dummy.scale.set(h.sx*1.15, roofH, h.sz*1.15); dummy.updateMatrix();
                    housesRoofMesh.setMatrixAt(i, dummy.matrix);

                    const baseColor = Math.random() > 0.50 ? new THREE.Color(0x9a4e32) : new THREE.Color(0xdeb887);
                    housesMesh.setColorAt(i, baseColor);
                });

                housesMesh.instanceMatrix.needsUpdate = true;
                housesRoofMesh.instanceMatrix.needsUpdate = true;
                scene.add(housesMesh); scene.add(housesRoofMesh);
            }
        }

        // --- FLOWING TRAFFIC SYSTEM ---
        function createTrafficSystem() {
            const trafficCount = 180;
            const positions = new Float32Array(trafficCount * 3);
            const colors = new Float32Array(trafficCount * 3);

            for (let i = 0; i < trafficCount; i++) {
                const isAvenue = Math.random() > 0.45;
                const isRed = Math.random() > 0.5;
                const speedDir = Math.random() > 0.5 ? 1 : -1;
                const posFraction = Math.random();

                let vehicle = null;
                if (isAvenue) {
                    vehicle = { isAvenue: true, ref: nsAv[Math.floor(Math.random()*nsAv.length)], pos: posFraction, speed: (0.012+Math.random()*0.015)*speedDir };
                } else {
                    vehicle = { isAvenue: false, ref: ewSt[Math.floor(Math.random()*ewSt.length)], pos: posFraction, speed: (0.012+Math.random()*0.015)*speedDir };
                }
                trafficVehicles.push(vehicle);

                const c = isRed ? new THREE.Color(0xff2200) : new THREE.Color(0xffdf88);
                colors[i * 3] = c.r; colors[i * 3 + 1] = c.g; colors[i * 3 + 2] = c.b;
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            trafficSystem = new THREE.Points(geo, new THREE.PointsMaterial({
                size: 2.5, vertexColors: true, transparent: true, opacity: 0.9, depthWrite: false, blending: THREE.AdditiveBlending
            }));
            scene.add(trafficSystem);
        }

        function updateTrafficSystem() {
            if (!trafficSystem) return;
            const pos = trafficSystem.geometry.attributes.position;
            const positions = pos.array;

            trafficVehicles.forEach((v, idx) => {
                v.pos += v.speed * 0.04;
                if (v.pos > 1) v.pos = 0;
                else if (v.pos < 0) v.pos = 1;

                let px = 0, py = 0;
                if (v.isAvenue) {
                    px = v.ref.x; py = v.ref.from + v.pos * (v.ref.to - v.ref.from);
                } else {
                    py = v.ref.y; px = v.ref.from + v.pos * (v.ref.to - v.ref.from);
                }

                const wPos = toWorld(px, py); wPos.y += 0.8;
                positions[idx * 3] = wPos.x; positions[idx * 3 + 1] = wPos.y; positions[idx * 3 + 2] = wPos.z;
            });
            pos.needsUpdate = true;
        }

        // --- PHYSICAL ROAD NETWORKS ---
        function createPhysicalRoadNetwork() {
            const roadGroup = new THREE.Group();
            const asphaltMat = new THREE.MeshStandardMaterial({ color: 0x141416, roughness: 0.9, metalness: 0.1, side: THREE.DoubleSide });
            const lineMat = new THREE.MeshBasicMaterial({ color: 0xD4AF37, side: THREE.DoubleSide });
            
            nsAv.forEach(av => {
                const xMid = (av.x - 0.5) * planeW;
                const zStart = (av.from - 0.5) * planeH; const zEnd = (av.to - 0.5) * planeH;
                const length = zEnd - zStart; if (length <= 0) return;
                const segments = Math.max(1, Math.floor(length / 2.0));
                
                const roadGeo = new THREE.PlaneGeometry(av.w, length, 1, segments).rotateX(-Math.PI / 2);
                const pos = roadGeo.attributes.position;
                for (let i = 0; i < pos.count; i++) {
                    pos.setY(i, getHeight(xMid + pos.getX(i), (zStart + zEnd)/2 + pos.getZ(i)) + 0.15);
                }
                roadGeo.computeVertexNormals();
                const roadMesh = new THREE.Mesh(roadGeo, asphaltMat); roadMesh.position.set(xMid, 0, (zStart + zEnd)/2);
                roadGroup.add(roadMesh);
                
                const lineGeo = new THREE.PlaneGeometry(0.18, length, 1, segments).rotateX(-Math.PI / 2);
                const linePos = lineGeo.attributes.position;
                for (let i = 0; i < linePos.count; i++) {
                    linePos.setY(i, getHeight(xMid + linePos.getX(i), (zStart + zEnd)/2 + linePos.getZ(i)) + 0.18);
                }
                lineGeo.computeVertexNormals();
                const lineMesh = new THREE.Mesh(lineGeo, lineMat); lineMesh.position.set(xMid, 0, (zStart + zEnd)/2);
                roadGroup.add(lineMesh);
            });

            ewSt.forEach(st => {
                const zMid = (st.y - 0.5) * planeH;
                const xStart = (st.from - 0.5) * planeW; const xEnd = (st.to - 0.5) * planeW;
                const length = xEnd - xStart; if (length <= 0) return;
                const segments = Math.max(1, Math.floor(length / 2.0));
                
                const roadGeo = new THREE.PlaneGeometry(length, st.w, segments, 1).rotateX(-Math.PI / 2);
                const pos = roadGeo.attributes.position;
                for (let i = 0; i < pos.count; i++) {
                    pos.setY(i, getHeight((xStart + xEnd)/2 + pos.getX(i), zMid + pos.getZ(i)) + 0.15);
                }
                roadGeo.computeVertexNormals();
                const roadMesh = new THREE.Mesh(roadGeo, asphaltMat); roadMesh.position.set((xStart + xEnd)/2, 0, zMid);
                roadGroup.add(roadMesh);
            });
            scene.add(roadGroup);
        }

        // --- SAMPLE ROUTES & CREATIONS ---
        function sampleRoute(routeData, sps) {
            if (!routeData || routeData.length < 2) return null;
            const points = []; sps = sps || 25;
            for (let i = 0; i < routeData.length - 1; i++) {
                for (let t = 0; t <= 1; t += 1/sps) {
                    const px = routeData[i].px + (routeData[i+1].px - routeData[i].px) * t;
                    const py = routeData[i].py + (routeData[i+1].py - routeData[i].py) * t;
                    points.push(toWorld(px, py).add(new THREE.Vector3(0, 1.5, 0)));
                }
            }
            return points;
        }

        function createRoutes() {
            for (let i = 1; i < CASINOS_DATA.length; i++) {
                const pts = sampleRoute(CASINOS_DATA[i].route);
                if (!pts) { routeLines.push(null); continue; }
                const line = new THREE.Line(
                    new THREE.BufferGeometry().setFromPoints(pts),
                    new THREE.LineBasicMaterial({ color: 0xD4AF37, transparent: true, opacity: 0.75 })
                );
                line.userData = { totalPoints: pts.length, points: pts };
                scene.add(line); routeLines.push(line);
            }

            characterSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: createCharacterTexture(), transparent: true, depthWrite: false }));
            characterSprite.scale.set(10, 10, 1); scene.add(characterSprite);
        }

        // --- PARTICLES ---
        function createExplosion(worldPos, isWin) {
            const count = isWin ? 70 : 45;
            particleData = [];
            const positions = new Float32Array(count*3);
            const colors = new Float32Array(count*3);
            const color = isWin ? new THREE.Color(0x2ecc71) : new THREE.Color(0xe74c3c);
            for (let i = 0; i < count; i++) {
                positions[i*3]=worldPos.x; positions[i*3+1]=worldPos.y+16; positions[i*3+2]=worldPos.z;
                colors[i*3]=color.r; colors[i*3+1]=color.g; colors[i*3+2]=color.b;
                const a=Math.random()*Math.PI*2, e=Math.random()*Math.PI-Math.PI/2, sp=0.3+Math.random()*0.9;
                particleData.push({ vx:Math.cos(a)*Math.cos(e)*sp, vy:Math.sin(e)*sp*1.6+0.4, vz:Math.sin(a)*Math.cos(e)*sp, life:1.0, decay:0.006+Math.random()*0.012 });
            }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
            geo.setAttribute('color', new THREE.BufferAttribute(colors,3));
            if (particleSystem) scene.remove(particleSystem);
            particleSystem = new THREE.Points(geo, new THREE.PointsMaterial({ size: 3.5, vertexColors: true, transparent: true, opacity: 1, blending: THREE.AdditiveBlending, depthWrite: false }));
            scene.add(particleSystem);
        }

        function updateParticles() {
            if (!particleSystem || !particleData.length) return;
            const pos = particleSystem.geometry.attributes.position;
            let allDead = true;
            for (let i = 0; i < particleData.length; i++) {
                const pd = particleData[i];
                pd.life -= pd.decay; if (pd.life<=0){pd.life=0;continue;} allDead=false;
                pd.vy -= 0.008; pd.vx *= 0.97; pd.vz *= 0.97;
                pos.setX(i,pos.getX(i)+pd.vx); pos.setY(i,pos.getY(i)+pd.vy); pos.setZ(i,pos.getZ(i)+pd.vz);
            }
            pos.needsUpdate = true;
            particleSystem.material.opacity = Math.max(...particleData.map(p=>p.life));
            if (allDead) { scene.remove(particleSystem); particleSystem=null; particleData=[]; }
        }

        // --- TIME-OF-DAY ENVIRONMENT TRANSITIONS ---
        function updateClockHUD(t) {
            if (!clockTimeEl) return;
            const startHour = 20; 
            const totalHours = 11.5; 
            const elapsedMinutes = t * totalHours * 60;
            const totalSecs = (startHour * 60) + elapsedMinutes;
            const hour24 = Math.floor(totalSecs / 60) % 24;
            const minute = Math.floor(totalSecs % 60);
            
            const ampm = hour24 >= 12 || hour24 < 0 ? 'PM' : 'AM';
            let hour12 = hour24 % 12;
            if (hour12 === 0) hour12 = 12;
            
            const hourStr = hour12.toString().padStart(2, '0');
            const minuteStr = minute.toString().padStart(2, '0');
            clockTimeEl.textContent = `${hourStr}:${minuteStr} ${ampm}`;

            if (t < 0.25) {
                clockIconEl.textContent = '🌙'; clockLabelEl.textContent = 'NOCHE';
                clockLabelEl.style.borderColor = 'rgba(212,175,55,0.3)'; clockLabelEl.style.color = '#ebd07a';
            } else if (t < 0.50) {
                clockIconEl.textContent = '🌙'; clockLabelEl.textContent = 'MADRUGADA';
                clockLabelEl.style.borderColor = 'rgba(212,175,55,0.4)'; clockLabelEl.style.color = '#ffffff';
            } else if (t < 0.75) {
                clockIconEl.textContent = '🌌'; clockLabelEl.textContent = 'PRE-AMANECER';
                clockLabelEl.style.borderColor = 'rgba(155,89,182,0.4)'; clockLabelEl.style.color = '#d7bde2';
            } else if (t < 0.90) {
                clockIconEl.textContent = '🌅'; clockLabelEl.textContent = 'ALBA';
                clockLabelEl.style.borderColor = 'rgba(230,126,34,0.5)'; clockLabelEl.style.color = '#f5b041';
            } else {
                clockIconEl.textContent = '☀️'; clockLabelEl.textContent = 'MAÑANA';
                clockLabelEl.style.borderColor = 'rgba(46,204,113,0.5)'; clockLabelEl.style.color = '#2ecc71';
            }
        }

        function getStepT(step) {
            if (step <= 2) return 0.0;  
            if (step === 3) return 0.18; 
            if (step === 4) return 0.62; 
            if (step === 5) return 1.0;  
            return 0.0;
        }

        function updateEnvironment(t) {
            updateClockHUD(t);
            const cBgNight = new THREE.Color(0x05060d);
            const cBgDawn = new THREE.Color(0x1b0f2d); 
            const cBgMorning = new THREE.Color(0xf2b47d); 

            let cBg = new THREE.Color();
            let cAmbient = new THREE.Color();
            let cSun = new THREE.Color();
            
            let ambientIntensity = 0.7;
            let moonIntensity = 0.6;
            let sunIntensity = 0.0;
            let sunPos = new THREE.Vector3(-150, 40, -100);
            let emissiveIntensity = 1.6;
            let beamOpacity = 0.15;
            let fogDensity = 0.0022;

            if (t < 0.5) {
                const f = t / 0.5;
                cBg.copy(cBgNight).lerp(cBgDawn, f);
                cAmbient.copy(new THREE.Color(0x151b2d)).lerp(new THREE.Color(0x281a3a), f);
                ambientIntensity = 0.75 + f * 0.15; moonIntensity = 0.65 * (1 - f);
                cSun.copy(new THREE.Color(0xff4400)); sunIntensity = f * 0.45;
                sunPos.set(-200, 10 + f * 40, -100);
                emissiveIntensity = 1.6 - f * 0.6; beamOpacity = 0.15 - f * 0.07;
                fogDensity = 0.0022 + f * 0.0006;
            } else {
                const f = (t - 0.5) / 0.5;
                cBg.copy(cBgDawn).lerp(cBgMorning, f);
                cAmbient.copy(new THREE.Color(0x281a3a)).lerp(new THREE.Color(0xf7dcb5), f);
                ambientIntensity = 0.9 + f * 0.25; moonIntensity = 0.0;
                cSun.copy(new THREE.Color(0xff4400)).lerp(new THREE.Color(0xffeaad), f);
                sunIntensity = 0.45 + f * 0.95; sunPos.set(-200 + f * (-80), 50 + f * 110, -100 - f * 50);
                emissiveIntensity = 1.0 - f * 0.9; beamOpacity = 0.08 - f * 0.075;
                fogDensity = 0.0028 - f * 0.0010;
            }

            scene.background.copy(cBg);
            if (scene.fog) { scene.fog.color.copy(cBg); scene.fog.density = fogDensity; }
            if (ambientLight) { ambientLight.color.copy(cAmbient); ambientLight.intensity = ambientIntensity; }
            if (moonLight) { moonLight.intensity = moonIntensity; }
            if (sunLight) { sunLight.color.copy(cSun); sunLight.intensity = sunIntensity; sunLight.position.copy(sunPos); }

            if (skyscrapersMesh && skyscrapersMesh.material) skyscrapersMesh.material.emissiveIntensity = emissiveIntensity;
            if (housesMesh && housesMesh.material) housesMesh.material.emissiveIntensity = emissiveIntensity * 0.45;

            casinoMarkers.forEach(cm => {
                if (cm.userData && cm.userData.beam) cm.userData.beam.material.opacity = beamOpacity;
            });
        }

        // --- MAP INITS & STORY FLOW ---
        function initProceduralMap() {
            planeW = 600;
            const mapTex = new THREE.CanvasTexture(drawMedellinMap());
            mapTex.colorSpace = THREE.SRGBColorSpace;
            createTerrain(mapTex);
            createPhysicalRoadNetwork();
            generateProceduralCity();
            createCasinoMarkers();
            createRoutes();
            createTrafficSystem();

            centroGlow = new THREE.PointLight(0xffdf88, 2.5, 140); centroGlow.position.set(6, 12, -27); scene.add(centroGlow);
            pobladoGlow = new THREE.PointLight(0x8fa9ff, 1.8, 110); pobladoGlow.position.set(39, 8, 85); scene.add(pobladoGlow);

            setTimeout(() => {
                loadingEl.style.opacity = '0';
                setTimeout(() => loadingEl.style.display = 'none', 600);
            }, 600);
        }

        // --- STORY LOGIC ---
        function updateStoryUI() {
            storyTextEl.textContent = STORIES[mapStep];
            chapterBadge.textContent = `CAPÍTULO ${mapStep + 1}`;
            let diff = MONEY_DATA[mapStep] - currentMoney;
            currentMoney += diff * 0.15;
            moneyValueEl.textContent = "$" + Math.round(currentMoney).toLocaleString("es-CO");
            
            if (diff > 1000) { moneyValueEl.className = 'money-value rising'; }
            else if (diff < -1000) { moneyValueEl.className = 'money-value falling'; }
            else { moneyValueEl.className = 'money-value'; }
        }

        function setStoryStep(step) {
            mapStep = step;
            animProgress = 0;
            hasExploded = false;
            
            // Adjust camera focus
            const c = casinoMarkers[mapStep];
            targetCamTarget.copy(c.position);
            targetCamPos.copy(c.position).add(new THREE.Vector3(0, 85, 125)); // Cinematic focused view
            
            if (step === 0 && characterSprite) {
                characterSprite.position.copy(c.position).add(new THREE.Vector3(0, 1.5, 0));
                characterSprite.visible = true;
            }
            
            updateStoryUI();
            btnNext.textContent = (mapStep === CASINOS_DATA.length - 1) ? "Volver" : "Siguiente";
        }

        // --- SYSTEM LOOPS & ANIMS ---
        function animateMap() {
            requestAnimationFrame(animateMap);
            if (true) {
                controls.update();
                updateTrafficSystem();
                updateParticles();

                if (mapMode === 'explore') {
                    if (isTransitioning) {
                        camera.position.lerp(targetCamPos, 0.04);
                        currentCamTarget.lerp(targetCamTarget, 0.04);
                        controls.target.copy(currentCamTarget);
                        
                        if (camera.position.distanceTo(targetCamPos) < 1.0 && currentCamTarget.distanceTo(targetCamTarget) < 1.0) {
                            camera.position.copy(targetCamPos);
                            currentCamTarget.copy(targetCamTarget);
                            controls.target.copy(currentCamTarget);
                            isTransitioning = false;
                        }
                    }
                } else {
                    camera.position.lerp(targetCamPos, 0.04);
                    currentCamTarget.lerp(targetCamTarget, 0.04);
                    controls.target.copy(currentCamTarget);
                }

                // Rotations and beacons pulsating
                casinoMarkers.forEach((cm, i) => {
                    const isVis = (mapMode === 'explore') || (mapMode === 'story' && i <= mapStep);
                    cm.visible = isVis;
                    if (isVis && cm.userData) {
                        cm.userData.sprite.rotation.z += 0.005;
                        cm.userData.floatRing.rotation.y += 0.008;
                        cm.userData.floatRing.position.y = cm.userData.baseH + 6.0 + Math.sin(Date.now()*0.002)*0.5;
                        
                        const alpha = 0.5 + Math.sin(Date.now() * 0.008) * 0.5;
                        cm.userData.beacon.material.color.setRGB(alpha, 0, 0);
                        
                        const sc = 1.0 + Math.sin(Date.now()*0.004)*0.15;
                        cm.userData.pulseRing.scale.set(sc, 1, sc);
                    }
                });

                if (mapMode === 'story') {
                    const stepT = getStepT(mapStep);
                    const currentT = getStepT(mapStep - 1 >= 0 ? mapStep - 1 : 0);
                    const t = currentT + (stepT - currentT) * Math.min(1.0, animProgress * 1.5);
                    updateEnvironment(t);

                    if (animProgress < 1.0) {
                        animProgress += 0.0035; 
                        if (animProgress > 1.0) animProgress = 1.0;

                        // Slide Samuel/Jeronimo characters along roads (Casino 0 -> 1 is route index 0, i.e. mapStep - 1)
                        const line = routeLines[mapStep - 1];
                        if (line && line.userData && line.userData.points.length > 0) {
                            const pts = line.userData.points;
                            const idx = Math.floor(animProgress * (pts.length - 1));
                            characterSprite.position.copy(pts[idx]);
                            characterSprite.visible = true;

                            // Character Tracking: make the camera focus and track the characters as they walk!
                            targetCamTarget.copy(characterSprite.position);
                            const followOffset = new THREE.Vector3(0, 85, 125);
                            targetCamPos.copy(characterSprite.position).add(followOffset);
                        }
                    } else if (animProgress >= 1.0 && !hasExploded) {
                        hasExploded = true;
                        const isWin = mapStep === 0 ? true : (MONEY_DATA[mapStep] >= MONEY_DATA[mapStep - 1]);
                        createExplosion(casinoMarkers[mapStep].position, isWin);
                        updateStoryUI();

                        // Arrived: Lock camera onto the destination casino
                        targetCamTarget.copy(casinoMarkers[mapStep].position);
                        targetCamPos.copy(casinoMarkers[mapStep].position).add(new THREE.Vector3(0, 85, 125));
                    }
                } else if (mapMode === 'explore') {
                    updateEnvironment(0.0); // full neon night
                    characterSprite.visible = false;
                } else {
                    updateEnvironment(0.0);
                    characterSprite.visible = false;
                }

                // Ambient floating dust animation
                scene.traverse(node => {
                    if (node.userData && node.userData.isDust) {
                        node.rotation.y += 0.0003;
                    }
                });

                renderer.render(scene, camera);
            }
        }

        // --- BUTTONS HUD INTERACTION ---
        btnExplore.addEventListener('click', () => {
            mapMode = 'explore';
            overlayStart.classList.add('hidden');
            overlayExplore.classList.add('active');
            controls.enabled = true;
            targetCamPos.set(0, 240, 380); targetCamTarget.set(0, 0, 0);
            isTransitioning = true;
        });

        btnStory.addEventListener('click', () => {
            mapMode = 'story';
            overlayStart.classList.add('hidden');
            overlayStory.classList.add('active');
            controls.enabled = false;
            currentMoney = 0;
            setStoryStep(0);
        });

        btnNext.addEventListener('click', () => {
            if (animProgress < 1.0) return; // wait till character arrives!
            
            if (mapStep < CASINOS_DATA.length - 1) {
                setStoryStep(mapStep + 1);
            } else {
                // Back to start screen
                mapMode = 'start';
                overlayStory.classList.remove('active');
                overlayStart.classList.remove('hidden');
                controls.enabled = false;
                targetCamPos.set(0, 320, 460); targetCamTarget.set(0, 0, 0);
            }
        });

        btnBack.addEventListener('click', () => {
            mapMode = 'start';
            overlayExplore.classList.remove('active');
            overlayStart.classList.remove('hidden');
            controls.enabled = false;
            targetCamPos.set(0, 320, 460); targetCamTarget.set(0, 0, 0);
        });

        // Initialize 3D Medellín Map
        initProceduralMap();
        animateMap();

        // Hover raycasting tooltips for casinos
        window.addEventListener('mousemove', (e) => {
            if (mapMode !== 'explore') return;
            const rect = container.getBoundingClientRect();
            mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);
            const valid = intersects.filter(it => it.object.parent && casinoMarkers.includes(it.object.parent));
            
            if (valid.length > 0) {
                const cm = valid[0].object.parent;
                if (hoveredMarker !== cm) {
                    hoveredMarker = cm;
                    container.style.cursor = 'pointer';
                    tooltipEl.textContent = cm.userData.name;
                    tooltipEl.style.display = 'block';
                }
                const screenPos = cm.position.clone().project(camera);
                const tx = (screenPos.x * 0.5 + 0.5) * rect.width;
                const ty = (-screenPos.y * 0.5 + 0.5) * rect.height;
                tooltipEl.style.left = `${tx}px`;
                tooltipEl.style.top = `${ty}px`;
            } else {
                hoveredMarker = null;
                container.style.cursor = 'default';
                tooltipEl.style.display = 'none';
            }
        });

        window.addEventListener('click', () => {
            if (mapMode === 'explore' && hoveredMarker) {
                // Focus on selected casino in explore mode
                targetCamTarget.copy(hoveredMarker.position);
                targetCamPos.copy(hoveredMarker.position).add(new THREE.Vector3(0, 45, 65));
                isTransitioning = true;
            }
        });

        window.addEventListener('resize', () => {
            if (container.clientWidth > 0) {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            }
        });
    </script>
</body>
